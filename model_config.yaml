current_target: gemma-4-e2b

datasets_path: "data/datasets"
# If downloading datasets, in the datasets/ dir, format as this: <dataset_id>/<dataset_name>/
# Otherwise hf auth / login is recommended.

pipeline_defaults:
  harvest:
    max_examples: 5000
    batch_size: 8
    max_seq_len: 256
  sae:
    epochs: 50
    lr: 1e-4
    batch_size: 64
    expansion_factor: 8
    l1_coeff: 0.01
    cb_coeff: 1.0
  adapter:
    steps: 200
    rank: 16
    lr: 2e-4
    batch_size: 1
    grad_accum: 8

models:
  llama-3.2-1b:
    path: "unsloth/Llama-3.2-1B-Instruct"
    adapter_dir: "adapters/llama-3.2-1b/"
    harvest_layers: [8, 14]   # midpoint (8) + refinement (14)
    d_model: 2048
    num_layers: 16
    # Proven end-to-end: harvest → SAE → adapter train → mrna_worker merge (16 layers).
    # Science triad benchmark: 5/6 routing on Llama SAE (electrostatics boundary miss).

  gemma-3-4b:
    path: "unsloth/gemma-3-4b-it"
    adapter_dir: "adapters/gemma3-4b/"
    harvest_layers: [17, 30]  # midpoint (17) + late pass (30)
    d_model: 2560
    num_layers: 34
    # Blocked: 7.9 GiB model load leaves no KV headroom on 12 GB VRAM. <-- vLLM stage

  gemma-4-e2b:
    path: "unsloth/gemma-4-E2B-it" # active: unsloth support confirmed 2026-04-02
    revision: "37ea165b3fba25b7d851f8ce4ccff9a4f0751cee"  # pinned — GGUF + adapters built from this
    gguf_path: "models/gemma-4-e2b-q8.gguf"   # 4.94 GB q8_0, converted 2026-04-02
    adapter_dir: "adapters/gemma4-e2b/"
    harvest_layers: [14, 25]  # ~40% for domain signal, 71% for PIDX voice layer
    d_model: 1536
    num_layers: 35
    # Unsloth support confirmed 2026-04-02 (unsloth-zoo upgraded to 2026.4.2).
    # d_model=1536 verified from model.config.text_config.hidden_size.
    # Total model params: 4.17B (includes vision encoder). Text backbone: ~2B.
    # head_dim=256, 8 attn heads, intermediate_size=6144. Layers path: model.model.layers.
    # Gemma4ForConditionalGeneration — multimodal (image + audio).
    # vLLM incompatible: Gemma 3n per-layer embedding reversal → ~3072 GiB OOM.
    # Execution backend: llama.cpp (LlamaCppExecutionNode, llama-server HTTP API).
    # GGUF LoRA: convert_adapters_to_gguf.py after retraining on E2B base.

  qwen3.5-2b:
    path: "unsloth/Qwen3.5-2B"
    adapter_dir: "adapters/qwen3.5-2b/"
    harvest_layers: [14, 24]  # midpoint (14) + final pass (24)
    d_model: 1536
    num_layers: 28
    # Candidate for tool-use / autoresearch tasks. Not yet evaluated.

  qwen3.5-0.8b: # Thinks too long for any meaningful output
    path: "unsloth/Qwen3.5-0.8B"
    adapter_dir: "adapters/qwen3.5-0.8b/"
    harvest_layers: [6, 12]   # early coarse + late refined
    d_model: 1024
    num_layers: 14
    # Ultra-light candidate. Tool use + speed tradeoff TBD.

datasets:
  # Science Triad (L14)
  biology:
    id: "camel-ai/biology"
    column: "message_1"
    description: "Standard science triad: biology logic pass."
  
  chemistry:
    id: "camel-ai/chemistry"
    column: "message_1"
    description: "Standard science triad: chemistry logic pass."

  physics:
    id: "camel-ai/physics"
    column: "message_1"
    description: "Standard science triad: physics logic pass."

  # Persona Triad (L25 - Voice Pass)
  # Tracks 'HOW' the model speaks (Style over Domain)
  formal:
    id: "lmsys/chatbot_arena_conversations" 
    column: "conversation_a"
    description: "High-level academic/formal style pass via model-winning comparisons."
  
  concise:
    id: "PygmalionAI/PIPPA"
    column: "conversation"
    description: "Brief, high-cadence dialogue (PIPPA)."

  creative:
    id: "Dampfinchen/Creative_Writing_Multiturn"
    column: "conversations" 
    description: "Persona-heavy roleplay/creative pass from multi-turn writing tasks."
