# Ruff Configuration
# https://docs.astral.sh/ruff/settings/

target-version = "py312"
line-length = 88

[lint]
# Enable Pyflakes (F), pycodestyle (E, W), and Bandit (S)
select = ["F", "E", "W", "S", "I"]
ignore = [
    "F401", # Unused imports
    "F841", # Unused local variables
    "E501", # Line too long
    "S101", # Use of assert
    "S105", # Possible hardcoded password
    "E731", # Do not assign a lambda expression
    "S311", # Standard pseudo-random generators (noisy for research)
    "S603", # subprocess call with untrusted input (noisy for research)
    "S104", # Bind to all interfaces (0.0.0.0) (common in dev/docker)
    "E402", # Module level import not at top (common for lazy loading)
]

# Allow fix for all enabled rules (when `--fix`)
fixable = ["ALL"]
unfixable = []

# Exclude a variety of commonly ignored directories.
exclude = [
    ".git",
    ".pycache__",
    ".venv",
    "build",
    "dist",
    "data",
    "models",
    "adapters",
    "sandbox-scripts",
]

[lint.per-file-ignores]
# Allow certain security violations in tests (e.g., assert)
"tests/*" = ["S101"]

[format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"
